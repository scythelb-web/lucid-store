services:
  - type: web
    name: lucid-store
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: LUCID_EMAIL
        value: sales@lucidvinyl.com
      - key: DOMAIN
        sync: false
      - key: DB_PATH
        value: /data/orders.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
