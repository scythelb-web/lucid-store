<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Cancelled — Lucid Vinyl</title>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
            --text: #e0e0e8; --muted: #6b6b80; --accent: #a78bfa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 3rem 2rem; text-align: center; max-width: 420px; margin: 1rem;
        }
        .card h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
        .card p { color: var(--muted); margin-bottom: 1.5rem; }
        .btn {
            display: inline-block; padding: 0.75rem 2rem; background: var(--accent);
            color: var(--bg); border-radius: 8px; text-decoration: none; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Order Cancelled</h1>
        <p>No charges were made. If you changed your mind, no worries — you can start a new order anytime.</p>
        <a href="/" class="btn">Start New Order</a>
    </div>
</body>
</html>
